<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agricultura Familiar en Colombia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #146215 0%, #2c9e45 100%);
      --bg-color: #f0f4f1;
      --text-main: #2d3436;
      --text-muted: #636e72;
      --card-bg: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(255, 255, 255, 0.4);
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
    }

    .header {
      background: var(--primary-gradient);
      color: white;
      text-align: center;
      padding: 40px 20px;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      box-shadow: 0 4px 20px rgba(20, 98, 21, 0.2);
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      margin: 8px 0 0;
      opacity: 0.9;
    }

    .container-custom {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .card {
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      margin-bottom: 24px;
      overflow: hidden;
      transition: var(--transition);
      padding: 24px;
    }

    .search-section .input-group-text {
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-weight: 600;
      margin-right: 8px;
    }

    .search-section .form-control {
      border: 1px solid #d1e7d1;
      border-radius: 12px !important;
      padding: 12px 18px;
      transition: var(--transition);
    }

    .search-section .form-control:focus {
      border-color: #2c9e45;
      box-shadow: 0 0 0 0.25rem rgba(44, 158, 69, 0.1);
    }

    .stats {
      background: linear-gradient(135deg, #e9f7ef 0%, #d1e7d1 100%);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      color: #146215;
    }

    .stats p {
      margin: 5px 0;
      font-weight: 600;
    }

    .table-container {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #e9f7ef;
    }

    .table {
      margin-bottom: 0;
    }

    .table thead th {
      background-color: #146215;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 0.95rem;
      border: none;
    }

    .table tbody td {
      padding: 12px;
      vertical-align: middle;
      text-align: center;
      color: var(--text-main);
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f4f1;
    }

    .progress {
      height: 12px;
      border-radius: 50px;
      background-color: #e9f7ef;
      margin: 20px 0;
      overflow: hidden;
    }

    .progress-bar {
      background: var(--primary-gradient);
    }

    .footer {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .footer a {
      color: #2c9e45;
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }

    .footer a:hover {
      color: #146215;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="header">
    <h1>Agricultura Familiar en Colombia</h1>
    <p>Consulta datos en tiempo real sobre áreas de agricultura familiar</p>
  </div>

  <div class="container-custom">
    <!-- Search Section -->
    <div class="card search-section">
      <div class="input-group">
        <span class="input-group-text"><i class="fa fa-search me-2"></i> Buscar</span>
        <input type="text" class="form-control" id="search-input" placeholder="Departamento o Municipio">
      </div>
    </div>

    <!-- Stats Section -->
    <div class="card stats">
      <p id="registros"><i class="fa fa-list-ol me-2"></i> Registros encontrados: 0</p>
      <p id="sum-ha"><i class="fa fa-mountain me-2"></i> Total de hectáreas halladas: 0.00 (ha)</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress" id="progress-bar" style="display: none;">
      <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 100%;">
      </div>
    </div>

    <!-- Table Section -->
    <div class="card table-container p-0">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Departamento</th>
              <th>Municipio</th>
              <th>Área (ha)</th>
            </tr>
          </thead>
          <tbody id="data-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Datos obtenidos de <a href="https://www.datos.gov.co/" target="_blank">datos.gov.co</a></p>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const dataTable = document.getElementById("data-body");
      const searchInput = document.getElementById("search-input");
      const progressBar = document.getElementById("progress-bar");
      const registrosElement = document.getElementById("registros");
      const sumHaElement = document.getElementById("sum-ha");

      let data = [];
      let registros = 0;
      let totalHectareas = 0;

      // Mostrar barra de progreso mientras se cargan los datos
      progressBar.style.display = "block";

      // Obtener datos de la API
      fetch("https://www.datos.gov.co/resource/prwt-hcai.json")
        .then(response => response.json())
        .then(apiData => {
          data = apiData;
          renderData();
          progressBar.style.display = "none"; // Ocultar barra de progreso
        })
        .catch(error => {
          console.error("Error al obtener los datos:", error);
        });

      // Renderizar datos en la tabla
      const renderData = () => {
        const searchTerm = searchInput.value.toLowerCase().trim();
        const filteredData = data.filter(item => {
          return (
            item.departamen.toLowerCase().includes(searchTerm) ||
            item.municipio.toLowerCase().includes(searchTerm)
          );
        });

        dataTable.innerHTML = "";
        registros = 0;
        totalHectareas = 0;

        filteredData.forEach(item => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${item.departamen}</td>
            <td>${item.municipio}</td>
            <td>${parseFloat(item.area_ha).toFixed(2)}</td>
          `;
          dataTable.appendChild(row);
          registros++;
          totalHectareas += parseFloat(item.area_ha);
        });

        registrosElement.textContent = `Registros encontrados: ${registros}`;
        sumHaElement.textContent = `Total de hectáreas halladas: ${totalHectareas.toFixed(2)} (ha)`;
      };

      // Actualizar datos al escribir en el cuadro de búsqueda
      searchInput.addEventListener("input", renderData);
    });
  </script>
</body>

</html>
