<!DOCTYPE html>
<html lang="es">

<head>
    <title>Error 404 - Página no encontrada</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #146215 0%, #2c9e45 100%);
            --bg-color: #f0f4f1;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --card-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header-custom {
            background: var(--primary-gradient);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(20, 98, 21, 0.2);
            margin-bottom: 50px;
        }

        .header-custom h2 {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0;
        }

        .container-error {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px 60px;
        }

        .card-error {
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--shadow-soft);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            text-align: center;
            transition: var(--transition);
        }

        .card-error:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .error-icon {
            font-size: 5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .error-code {
            font-size: 4rem;
            font-weight: 800;
            color: #146215;
            line-height: 1;
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .error-description {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-custom {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 30px;
            border-radius: 20px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            box-shadow: 0 5px 15px rgba(20, 98, 21, 0.2);
        }

        .btn-custom i {
            margin-right: 10px;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(20, 98, 21, 0.4);
            color: white;
        }

        @media (max-width: 768px) {
            .header-custom {
                padding: 30px 15px;
                margin-bottom: 30px;
            }

            .header-custom h2 {
                font-size: 1.5rem;
            }

            .card-error {
                padding: 30px 20px;
            }

            .error-code {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>
    <div class="header-custom">
        <h2>Atención</h2>
    </div>

    <div class="container-error">
        <div class="card-error">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="error-code">404</div>
            <div class="error-message">Página no encontrada</div>
            <div class="error-description">
                Lo sentimos, la página que buscas no está disponible en este momento o ha sido movida a una nueva
                ubicación.
            </div>
            <a href="go:sub_region" class="btn-custom">
                <i class="fas fa-home"></i> Volver al Inicio
            </a>
        </div>
    </div>
</body>

</html>
